  #controls { flex:1 1 auto; width:100%; display:flex; align-items:center; justify-content:space-between;

<script>
'use strict';
window.onerror = function(m, s, l, c){ const e=document.getElementById('err');
  e.style.display='block'; e.textContent='Error: '+m+' @'+l+':'+c; };

/* ============================== CORE ============================== */
const W=256, H=224, TS=16;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
function fitCanvas(){
  const stage=document.getElementById('stage');
  const avail=window.innerHeight, cw=Math.min(window.innerWidth, 560);
  const ctrlMin=170;
  let scale=Math.min(cw/W, (avail-ctrlMin)/H);
  scale=Math.max(1, Math.floor(scale*4)/4);
  cv.style.width=(W*scale)+'px'; cv.style.height=(H*scale)+'px';
}
window.addEventListener('resize', fitCanvas); fitCanvas();

const R=n=>Math.random()*n, RI=n=>Math.floor(Math.random()*n);
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
let frameResolvers=[];
function waitFrame(){ return new Promise(r=>frameResolvers.push(r)); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ============================== INPUT ============================= */
const Input={dx:0, dy:0, queue:[], taps:[]};
function pushBtn(b){ Input.queue.push(b); if(Input.queue.length>4)Input.queue.shift(); }
function readBtn(){ return Input.queue.shift()||null; }
function readTap(){ return Input.taps.shift()||null; }
function flushInput(){ Input.queue.length=0; Input.taps.length=0; }

const dbtns={up:[0,-1],dn:[0,1],lf:[-1,0],rt:[1,0]};
const dstate={up:0,dn:0,lf:0,rt:0};
let dirRepeatT=0, lastDir=null;
function updDpad(){
  Input.dx=(dstate.rt?1:0)-(dstate.lf?1:0);
  Input.dy=(dstate.dn?1:0)-(dstate.up?1:0);
}
function bindDir(id,key){
  const el=document.getElementById('d-'+id.slice(0,2));
  const on=e=>{e.preventDefault(); dstate[key]=1; el.classList.add('on'); updDpad();
    pushBtn(key==='up'?'UP':key==='dn'?'DOWN':key==='lf'?'LEFT':'RIGHT'); unlockAudio();};
  const off=e=>{e.preventDefault(); dstate[key]=0; el.classList.remove('on'); updDpad();};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on); el.addEventListener('mouseup',off);
  el.addEventListener('mouseleave',off);
}
bindDir('up','up'); bindDir('dn','dn'); bindDir('lf','lf'); bindDir('rt','rt');
// held-direction repeat for menus
setInterval(()=>{
  const d=Input.dy<0?'UP':Input.dy>0?'DOWN':Input.dx<0?'LEFT':Input.dx>0?'RIGHT':null;
  if(d && d===lastDir){ dirRepeatT++; if(dirRepeatT>2){ pushBtn(d); dirRepeatT=1; } }
  else { lastDir=d; dirRepeatT=0; }
},110);

function bindBtn(id,name){
  const el=document.getElementById(id);
  const on=e=>{e.preventDefault(); el.classList.add('on'); pushBtn(name); unlockAudio();};
  const off=e=>{e.preventDefault(); el.classList.remove('on');};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('mousedown',on); el.addEventListener('mouseup',off);
}
bindBtn('btnA','A'); bindBtn('btnB','B');

document.addEventListener('keydown',e=>{
  if(e.repeat){ if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))return; }
  unlockAudio();
  switch(e.key){
    case 'ArrowUp': case 'w': dstate.up=1; pushBtn('UP'); break;
    case 'ArrowDown': case 's': dstate.dn=1; pushBtn('DOWN'); break;
    case 'ArrowLeft': case 'a': dstate.lf=1; pushBtn('LEFT'); break;
    case 'ArrowRight': case 'd': dstate.rt=1; pushBtn('RIGHT'); break;
    case 'Enter': case 'z': case ' ': pushBtn('A'); break;
    case 'Escape': case 'x': case 'Backspace': pushBtn('B'); break;
  } updDpad();
});
document.addEventListener('keyup',e=>{
  switch(e.key){
    case 'ArrowUp': case 'w': dstate.up=0; break;
    case 'ArrowDown': case 's': dstate.dn=0; break;
    case 'ArrowLeft': case 'a': dstate.lf=0; break;
    case 'ArrowRight': case 'd': dstate.rt=0; break;
  } updDpad();
});
cv.addEventListener('touchstart',e=>{
  e.preventDefault(); unlockAudio();
  const r=cv.getBoundingClientRect(), t=e.touches[0];
  Input.taps.push({x:(t.clientX-r.left)/r.width*W, y:(t.clientY-r.top)/r.height*H});
  if(Input.taps.length>3)Input.taps.shift();
},{passive:false});
cv.addEventListener('mousedown',e=>{
  const r=cv.getBoundingClientRect();
  Input.taps.push({x:(e.clientX-r.left)/r.width*W, y:(e.clientY-r.top)/r.height*H});
});

/* ============================== AUDIO ============================= */
let AC=null, masterG=null, musicG=null, audioOn=true;
function unlockAudio(){
  if(AC) { if(AC.state==='suspended')AC.resume(); return; }
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    masterG=AC.createGain(); masterG.gain.value=0.55; masterG.connect(AC.destination);
    musicG=AC.createGain(); musicG.gain.value=0.42; musicG.connect(masterG);
    if(Music.pending){ Music.play(Music.pending); }
  }catch(err){}
}
let noiseBuf=null;
function getNoise(){
  if(noiseBuf)return noiseBuf;
  noiseBuf=AC.createBuffer(1, AC.sampleRate*0.5, AC.sampleRate);
  const d=noiseBuf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  return noiseBuf;
}
const NOTE={C:0,'C#':1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,G:7,'G#':8,Ab:8,A:9,Bb:10,B:11};
function nf(name){ // 'A4' -> freq
  const m=name.match(/^([A-G][b#]?)(\d)$/); if(!m)return 440;
  return 440*Math.pow(2,(NOTE[m[1]]-9)/12 + (parseInt(m[2])-4));
}
function tone(freq,start,dur,wave,vol,dest,slide){
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=wave; o.frequency.setValueAtTime(freq,start);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,slide),start+dur);
  g.gain.setValueAtTime(vol,start);
  g.gain.setValueAtTime(vol,start+dur*0.7);
  g.gain.linearRampToValueAtTime(0.0001,start+dur);
  o.connect(g); g.connect(dest||masterG);
  o.start(start); o.stop(start+dur+0.02);
}
function noiseHit(start,dur,vol,hp){
  const s=AC.createBufferSource(); s.buffer=getNoise(); s.loop=true;
  const f=AC.createBiquadFilter(); f.type=hp?'highpass':'lowpass';
  f.frequency.value=hp?2000:900;
  const g=AC.createGain(); g.gain.setValueAtTime(vol,start);
  g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  s.connect(f); f.connect(g); g.connect(masterG);
  s.start(start); s.stop(start+dur+0.02);
}
const SFX={
  cursor(){ if(!AC)return; tone(1250,AC.currentTime,0.045,'square',0.12); },
  confirm(){ if(!AC)return; const t=AC.currentTime; tone(1050,t,0.05,'square',0.13); tone(1550,t+0.06,0.07,'square',0.13); },
  cancel(){ if(!AC)return; tone(360,AC.currentTime,0.09,'square',0.13); },
  buzz(){ if(!AC)return; tone(160,AC.currentTime,0.16,'sawtooth',0.16); },
  hit(){ if(!AC)return; const t=AC.currentTime; noiseHit(t,0.14,0.35); tone(220,t,0.1,'square',0.14,null,60); },
  crit(){ if(!AC)return; const t=AC.currentTime; noiseHit(t,0.2,0.45); tone(1800,t,0.14,'square',0.2,null,300); tone(120,t,0.16,'sawtooth',0.2,null,40); },
  miss(){ if(!AC)return; noiseHit(AC.currentTime,0.16,0.14,true); },
  heal(){ if(!AC)return; const t=AC.currentTime; ['C6','E6','G6','C7'].forEach((n,i)=>tone(nf(n),t+i*0.07,0.16,'sine',0.15)); },
  magic(){ if(!AC)return; const t=AC.currentTime; tone(300,t,0.35,'sawtooth',0.12,null,1600); noiseHit(t+0.1,0.25,0.15,true); },
  bad(){ if(!AC)return; const t=AC.currentTime; tone(500,t,0.3,'triangle',0.2,null,90); },
  swirl(){ if(!AC)return; const t=AC.currentTime; tone(120,t,0.8,'sawtooth',0.16,null,1900); noiseHit(t,0.8,0.1,true); },
  chest(){ if(!AC)return; const t=AC.currentTime; tone(nf('B5'),t,0.09,'square',0.15); tone(nf('E6'),t+0.1,0.22,'square',0.15); },
  save(){ if(!AC)return; const t=AC.currentTime; ['G5','C6','E6'].forEach((n,i)=>tone(nf(n),t+i*0.09,0.2,'triangle',0.16)); },
  slam(){ if(!AC)return; const t=AC.currentTime; noiseHit(t,0.4,0.5); tone(70,t,0.4,'sine',0.4,null,30); },
  snore(){ if(!AC)return; const t=AC.currentTime; ['C5','D5','E5','G5','C6'].forEach((n,i)=>tone(nf(n),t+i*0.1,0.18,'triangle',0.15)); },
};
/* Music: tiny lookahead sequencer */
const Music={
  cur:null, pending:null, timer:null, nextT:0, pos:{},
  play(id){
    if(!AC){ this.pending=id; return; }
    if(this.cur===id)return;
    this.stop(); this.cur=id; this.pending=null;
    const song=SONGS[id]; if(!song)return;
    this.nextT=AC.currentTime+0.08; this.pos={};
    song.tracks.forEach((tr,i)=>this.pos[i]={idx:0,t:this.nextT});
    this.timer=setInterval(()=>this.tick(),90);
  },
  stop(){ if(this.timer){clearInterval(this.timer);this.timer=null;} this.cur=null; },
  tick(){
    const song=SONGS[this.cur]; if(!song||!AC)return;
    const beat=60/song.bpm, horizon=AC.currentTime+0.32;
    song.tracks.forEach((tr,i)=>{
      const p=this.pos[i];
      while(p.t<horizon){
        const step=tr.seq[p.idx%tr.seq.length];
        const dur=step[1]*beat;
        if(step[0]){
          if(step[0]==='X')noiseHit(p.t,0.06,tr.vol*0.9);
          else if(step[0]==='K'){ tone(90,p.t,0.1,'sine',tr.vol*1.4,musicG,45); }
          else tone(nf(step[0]),p.t,dur*(tr.stac||0.85),tr.wave,tr.vol,musicG);
        }
        p.t+=dur; p.idx++;
        if(!song.loop && p.idx>=tr.seq.length){ p.t=Infinity; }
      }
    });
  }
};

/* ============================ RENDER HELPERS ============================ */
function text(s,x,y,color,size){
  ctx.font='bold '+(size||8)+'px monospace'; ctx.textBaseline='top';
  ctx.fillStyle='#000'; ctx.fillText(s,x+1,y+1);
  ctx.fillStyle=color||'#fff'; ctx.fillText(s,x,y);
}
function textC(s,cx,y,color,size){
  ctx.font='bold '+(size||8)+'px monospace';
  const w=ctx.measureText(s).width; text(s,cx-w/2,y,color,size);
}
function textR(s,rx,y,color,size){
  ctx.font='bold '+(size||8)+'px monospace';
  const w=ctx.measureText(s).width; text(s,rx-w,y,color,size);
}
function win(x,y,w,h){ // classic FF blue gradient window
  const g=ctx.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,'#101078'); g.addColorStop(1,'#3050c8');
  ctx.fillStyle=g; ctx.fillRect(x+1,y+1,w-2,h-2);
  ctx.strokeStyle='#e8e8f8'; ctx.lineWidth=2; ctx.strokeRect(x+2,y+2,w-4,h-4);
  ctx.strokeStyle='#404060'; ctx.lineWidth=1; ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
}
function cursorHand(x,y){
  ctx.fillStyle='#fff';
  ctx.fillRect(x,y+2,5,3); ctx.fillRect(x+4,y+1,3,5); ctx.fillRect(x+6,y+2,2,3);
  ctx.fillStyle='#ffd898'; ctx.fillRect(x+5,y+2,2,2);
}
function bar(x,y,w,h,pct,c1,c2){
  ctx.fillStyle='#222'; ctx.fillRect(x,y,w,h);
  ctx.fillStyle=pct<0.3?'#e04040':c1; ctx.fillRect(x,y,Math.floor(w*clamp(pct,0,1)),h);
  ctx.strokeStyle=c2||'#889'; ctx.lineWidth=1; ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
}

const SPR={}; // id -> offscreen canvas
function buildSprite(id,rows,pal){
  const h=rows.length,w=rows[0].length;
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const g=c.getContext('2d');
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const ch=rows[y][x]; if(ch==='.'||ch===' ')continue;
    g.fillStyle=pal[ch]||'#f0f'; g.fillRect(x,y,1,1);
  }
  SPR[id]=c;
}
function humanSprite(id,o){
  // 12x16 person. o: {hair,hairC,skinC,shirtC,pantsC,dress,hat,hatC,coat}
  const H='h',F='f',E='e',S='s',P='p',B='b',A='a';
  const pal={h:o.hairC,f:o.skinC,e:'#101020',s:o.shirtC,p:o.pantsC,b:'#2a2018',a:o.hatC||'#223'};
  const r=[];
  const hair=o.hair||'short';
  if(o.hat){
    r.push('..aaaaaaaa..');
    r.push('.aaaaaaaaaa.');
    r.push('...ffffff...');
  }else if(hair==='short'){
    r.push('....hhhh....');
    r.push('...hhhhhh...');
    r.push('...hffffh...');
  }else if(hair==='long'){

  }else if(hair==='bob'){

  }else if(hair==='bald'){
    r.push('............');

    r.push('...hffffh...');
  }else if(hair==='slick'){
    r.push('...hhhhh....');
    r.push('...hhhhhh...');
    r.push('...hffffh...');
  }else if(hair==='bun'){
    r.push('..hh.hhh....');
    r.push('...hhhhhh...');
    r.push('...hffffh...');
  }
  if(hair==='long'){ r.push('..hfeffefh..'); r.push('..hffffffh..'); }
  else if(hair==='curly'||hair==='bob'){ r.push('..hfeffefh..'); r.push('..hffffffh..'); }
  else { r.push('...feffef...'); r.push('...ffffff...'); }
  r.push('....ffff....');
  const C=o.coat?'c':S; if(o.coat)pal.c=o.coat;
  r.push('..'+C+S+S+S+S+S+S+C+'..');
  r.push('.'+C+S+S+S+S+S+S+S+S+C+'.');
  r.push('.'+C+S+S+S+S+S+S+S+S+C+'.');
  r.push('.f'+C+S+S+S+S+S+S+C+'f.');
  if(o.dress){
    r.push('..pppppppp..');
    r.push('..pppppppp..');
    r.push('...pppppp...');
    r.push('...ff..ff...');
    r.push('...bb..bb...');
    r.push('...bb..bb...');
  }else{
    r.push('..pppppp....'.replace('pppppp..','pppppp..'));
    r.push('..pppppp....');
    r.push('..pp..pp....');
    r.push('..pp..pp....');
    r.push('..bb..bb....');
    r.push('.bbb..bbb...');
  }
  buildSprite(id,r,pal);
}

function drawSpr(id,x,y,scale,flip){
  const s=SPR[id]; if(!s)return;
  scale=scale||1;
  ctx.save();
  if(flip){ ctx.translate(Math.round(x)+s.width*scale,Math.round(y)); ctx.scale(-scale,scale); }
  else { ctx.translate(Math.round(x),Math.round(y)); ctx.scale(scale,scale); }
  ctx.drawImage(s,0,0);
  ctx.restore();
}

function expNext(l){ return Math.floor(12*l*l); }
function mkChar(id,lvl){
  const d=CHARDEF[id];
  const c={id,name:d.name,spr:d.spr,lvl,exp:0,weapon:d.weapon,armor:d.armor,skills:[],desp:d.desp};
  for(const k in d.learn)if(lvl>=+k)c.skills.push(d.learn[k]);
  recalcChar(c);
  c.hp=c.maxhp; c.bp=c.maxbp;
  return c;
}
function recalcChar(c){
  const d=CHARDEF[c.id], l=c.lvl-1;
  c.maxhp=Math.floor(d.hp+d.hpg*l); c.maxbp=Math.floor(d.bp+d.bpg*l);
  c.str=Math.floor(d.str+d.strg*l); c.mag=Math.floor(d.mag+d.magg*l);
  c.spd=Math.floor(d.spd+d.spdg*l); c.vit=Math.floor(d.vit+d.vitg*l);
}
function wAtk(c){ return WEAPONS[c.weapon]?WEAPONS[c.weapon].atk:0; }
function aDef(c){ return ARMOR[c.armor]?ARMOR[c.armor].def:0; }

/* enemies: ai returns {kind:'attack'|'skill', name?, pow, all?, status?, statusCh?, pierce?, heal?} */
function basicAI(specials){
  return function(e){
    if(specials)for(const s of specials){ if(Math.random()<s.ch)return Object.assign({},s.act); }
    return {kind:'attack',pow:1};
  };
}

/* ============================== STATE ============================== */
let G=null, busy=0, overlays=[], DLG=null, ENDSCENE=null, B=null, fade=0, fadeDir=0;
function newGame(){
  G={mode:'title',party:['gary'],chars:{gary:mkChar('gary',3)},inv:{lager:2,tea:1},
    gear:{w:[],a:[]},quid:30,flags:{},map:'flat',px:6,py:5,dir:'dn',danger:0,moving:null,
    steps:0,wins:0,mapMsgT:0};
}
function addPartyMember(id,lvl){
  if(!G.chars[id])G.chars[id]=mkChar(id,lvl);
  if(!G.party.includes(id))G.party.push(id);
}
function saveGame(slot){
  try{ localStorage.setItem('mbbrpg_'+slot,JSON.stringify({party:G.party,chars:G.chars,inv:G.inv,
    gear:G.gear,quid:G.quid,flags:G.flags,map:G.map,px:G.px,py:G.py,wins:G.wins,ts:Date.now()})); }catch(e){}
}
function loadGame(){
  let best=null;
  for(const s of ['save','auto']){
    try{ const d=JSON.parse(localStorage.getItem('mbbrpg_'+s)||'null');
      if(d&&(!best||d.ts>best.ts))best=d; }catch(e){}
  }
  if(!best)return false;
  newGame(); Object.assign(G,best,{mode:'field',moving:null,danger:0,mapMsgT:120});
  for(const id in G.chars){ const c=G.chars[id]; c.desp=CHARDEF[id].desp; }
  return true;
}
function hasSave(){ try{ return !!(localStorage.getItem('mbbrpg_save')||localStorage.getItem('mbbrpg_auto')); }catch(e){ return false; } }

/* ============================== DIALOG ============================== */
function wrapText(s,n){
  const words=s.split(' '), lines=[]; let cur='';
  for(const w of words){ if((cur+' '+w).trim().length>n){ lines.push(cur.trim()); cur=w; } else cur+=' '+w; }
  if(cur.trim())lines.push(cur.trim());
  return lines;
}
async function say(pages){
  busy++;
  let d=null;
  try{
    for(const p of pages){
      const lines=wrapText(p,46);
      for(let i=0;i<lines.length;i+=3){
        d={lines:lines.slice(i,i+3),chars:0,done:false};
        DLG=d;
        flushInput();
        while(true){
          await waitFrame();
          if(DLG!==d)return;
          d.chars+=1.6;
          const total=d.lines.join('').length;
          if(d.chars>=total)d.done=true;
          const b=readBtn(), t=readTap();
          if(b==='A'||b==='B'||t){ if(d.done){ SFX.cursor(); break; } else d.chars=total; }
        }
      }
    }
  } finally { busy--; if(DLG===d)DLG=null; }
}
function drawDialog(){
  if(!DLG)return;
  win(4,H-62,W-8,58);
  let rem=Math.floor(DLG.chars);
  for(let i=0;i<DLG.lines.length;i++){
    const l=DLG.lines[i], take=clamp(rem,0,l.length); rem-=l.length;
    text(l.slice(0,take),14,H-50+i*13,'#fff');
  }
  if(DLG.done && (Date.now()>>8)%2)text('▼',W-22,H-16,'#fff');
}
/* generic menu — returns index or -1 */
async function menu(opts){
  busy++;
  const m={sel:0,opts}; overlays.push(m);
  m.draw=()=>{
    const {x,y,w,items,title}=opts;
    const h=items.length*13+14+(title?12:0);
    win(x,y,w,h);
    let yy=y+8;
    if(title){ text(title,x+10,yy,'#ffe080'); yy+=12; }
    items.forEach((it,i)=>{
      const dis=it.dis;
      text(it.label,x+18,yy,dis?'#8890a8':'#fff');
      if(it.right)textR(it.right,x+w-8,yy,dis?'#8890a8':'#fff');
      if(i===m.sel)cursorHand(x+5,yy);
      yy+=13;
    });
  };
  flushInput();
  let res=-1;
  try{
    while(true){
      await waitFrame();
      const b=readBtn(), t=readTap();
      if(t){
        const {x,y,w,items,title}=opts; const y0=y+8+(title?12:0);
        const idx=Math.floor((t.y-y0)/13);
        if(t.x>=x&&t.x<=x+w&&idx>=0&&idx<items.length){
          if(idx===m.sel){ if(!items[idx].dis){ SFX.confirm(); res=idx; break; } else SFX.buzz(); }
          else { m.sel=idx; SFX.cursor(); }
        } else if(opts.cancel!==false){ SFX.cancel(); res=-1; break; }
        continue;
      }
      if(b==='UP'){ m.sel=(m.sel+opts.items.length-1)%opts.items.length; SFX.cursor(); }
      else if(b==='DOWN'){ m.sel=(m.sel+1)%opts.items.length; SFX.cursor(); }
      else if(b==='A'){ if(!opts.items[m.sel].dis){ SFX.confirm(); res=m.sel; break; } else SFX.buzz(); }
      else if(b==='B'&&opts.cancel!==false){ SFX.cancel(); res=-1; break; }
    }
  } finally {
    overlays.splice(overlays.indexOf(m),1); busy--;
  }
  return res;
}
function drawOverlays(){ overlays.forEach(o=>o.draw&&o.draw()); drawDialog(); }

/* ============================== FIELD ============================== */
function tileAt(map,x,y){
  const g=MAPS[map].grid;
  if(y<0||y>=g.length||x<0||x>=g[0].length)return {t:'black',s:1};
  return LEGEND[g[y][x]]||{t:'black',s:1};
}
function npcAt(x,y){
  const m=MAPS[G.map];
  return m.npcs.find(n=>n.x===x&&n.y===y&&(!n.cond||n.cond()));
}
function solidAt(x,y){
  const t=tileAt(G.map,x,y);
  if(t.s)return true;
  if(npcAt(x,y))return true;
  return false;
}
function doorAt(x,y){ return MAPS[G.map].doors.find(d=>d.x===x&&d.y===y); }
let doorMsgCool=0;
async function enterMap(id,x,y,dir){
  busy++;
  fadeDir=1; while(fade<1){ await waitFrame(); }
  G.map=id; G.px=x; G.py=y; G.dir=dir||G.dir; G.moving=null; G.mapMsgT=110;
  Music.play(MAPS[id].music);
  saveGame('auto');
  fadeDir=-1; while(fade>0){ await waitFrame(); }
  busy--;
}
const DIRV={up:[0,-1],dn:[0,1],lf:[-1,0],rt:[1,0]};
function updateField(dt){
  if(busy)return;
  if(G.mapMsgT>0)G.mapMsgT--;
  if(doorMsgCool>0)doorMsgCool--;
  if(G.moving){
    G.moving.t+=dt*6.5;
    if(G.moving.t>=1){
      G.px=G.moving.tx; G.py=G.moving.ty; G.moving=null;
      onArrive();
    }
    return;
  }
  const dx=Input.dx, dy=Input.dy;
  if(dx||dy){
    const d=dy<0?'up':dy>0?'dn':dx<0?'lf':'rt';
    G.dir=d;
    const v=DIRV[d], nx=G.px+v[0], ny=G.py+v[1];
    if(!solidAt(nx,ny))G.moving={fx:G.px,fy:G.py,tx:nx,ty:ny,t:0};
  }
  const b=readBtn(), t=readTap();
  if(b==='A'||t)fieldInteract();
  else if(b==='B')fieldMenu();
  else if(b&&!G.moving){ // single tap on d-pad = one step nudge
    const nd={UP:'up',DOWN:'dn',LEFT:'lf',RIGHT:'rt'}[b];
    if(nd){ G.dir=nd; const v=DIRV[nd], nx=G.px+v[0], ny=G.py+v[1];
      if(!solidAt(nx,ny))G.moving={fx:G.px,fy:G.py,tx:nx,ty:ny,t:0}; }
  }
}
function onArrive(){
  const d=doorAt(G.px,G.py);
  if(d){
    if(d.cond&&!d.cond()){
      if(doorMsgCool<=0){ doorMsgCool=40; say([d.fail||'It’s locked.']); }
      return;
    }
    enterMap(d.to,d.tx,d.ty,d.dir); return;
  }
  const m=MAPS[G.map];
  if(m.encounters){
    G.danger=(G.danger||0)+m.encounters.rate;
    if(RI(1024)<G.danger){
      G.danger=0;
      const f=m.encounters.forms[RI(m.encounters.forms.length)];
      startBattle(f,{});
    }
  }
}
async function fieldInteract(){
  if(busy)return;
  busy++;
  try{
    const v=DIRV[G.dir];
    let tx=G.px+v[0], ty=G.py+v[1];
    const m=MAPS[G.map];
    const n=npcAt(tx,ty);
    if(n){ await n.talk(); return; }
    const key=tx+','+ty;
    if(m.chests&&m.chests[key]&&!(G.flags['chest_'+G.map+'_'+key])){ await openChest(key,m.chests[key]); return; }
    if(m.hot&&m.hot[key]){ await m.hot[key](); return; }
    const t=tileAt(G.map,tx,ty);
    if(t.through){
      tx+=v[0]; ty+=v[1];
      const n2=npcAt(tx,ty); if(n2){ await n2.talk(); return; }
      const key2=tx+','+ty;
      if(m.hot&&m.hot[key2]){ await m.hot[key2](); return; }
    }
  } finally { busy--; }
}
async function openChest(key,c){
  G.flags['chest_'+G.map+'_'+key]=true; SFX.chest();
  if(c.quid){ G.quid+=c.quid; await say(['Found '+c.quid+' quid down the back of it!']); }
  else if(c.weapon){ G.gear.w.push(c.weapon); await say(['Found a '+WEAPONS[c.weapon].name+'!']); }
  else if(c.armor){ G.gear.a.push(c.armor); await say(['Found a '+ARMOR[c.armor].name+'!']); }
  else { G.inv[c.item]=(G.inv[c.item]||0)+(c.n||1);
    await say(['Found '+(c.n>1?c.n+'x ':'')+ITEMS[c.item].name+'!']); }
}
function camPos(){
  const m=MAPS[G.map], gw=m.grid[0].length*TS, gh=m.grid.length*TS;
  let px=G.px*TS, py=G.py*TS;
  if(G.moving){ px=(G.moving.fx+(G.moving.tx-G.moving.fx)*G.moving.t)*TS;
    py=(G.moving.fy+(G.moving.ty-G.moving.fy)*G.moving.t)*TS; }
  let cx=clamp(px-W/2+8,0,Math.max(0,gw-W)), cy=clamp(py-H/2+8,0,Math.max(0,gh-H));
  if(gw<W)cx=-(W-gw)/2; if(gh<H)cy=-(H-gh)/2;
  return {cx,cy,px,py};
}
function drawField(){
  const m=MAPS[G.map], {cx,cy,px,py}=camPos();
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  const x0=Math.floor(Math.max(0,cx)/TS), y0=Math.floor(Math.max(0,cy)/TS);
  for(let y=y0;y<Math.min(m.grid.length,y0+16);y++)
    for(let x=x0;x<Math.min(m.grid[0].length,x0+18);x++){
      const l=LEGEND[m.grid[y][x]];
      const openKey='chest_'+G.map+'_'+x+','+y;
      let tid=l?l.t:'black';
      if(tid==='chest'){
        ctx.drawImage(TILES[m.floor],x*TS-cx,y*TS-cy);
        tid=G.flags[openKey]?'chestopen':'chest';
      }
      ctx.drawImage(TILES[tid]||TILES.black,Math.round(x*TS-cx),Math.round(y*TS-cy));
    }
  if(m.objects)m.objects.forEach(o=>drawSpr(o.spr,o.x-cx,o.y-cy,o.sc||1));
  const ents=[];
  m.npcs.forEach(n=>{ if(!n.cond||n.cond())ents.push({y:n.y*TS,f:()=>{
    const bob=((Date.now()>>9)%2)?0:-1;
    drawSpr(n.spr,n.x*TS+2-cx,n.y*TS-4+bob-cy); }}); });
  ents.push({y:py,f:()=>{
    const bob=G.moving&&((Date.now()>>7)%2)?-1:0;
    drawSpr(G.party[0]?G.chars[G.party[0]].spr:'gary',px+2-cx,py-4+bob-cy,1,G.dir==='lf');
  }});
  ents.sort((a,b)=>a.y-b.y).forEach(e=>e.f());
  if(G.mapMsgT>0&&!busy){
    win(W/2-60,8,120,22); textC(m.name,W/2,15,'#ffe080');
  }
}

/* ============================== FIELD MENU ============================== */
function fmtHP(c){ return c.hp+'/'+c.maxhp; }
async function fieldMenu(){
  while(true){
    const partyDraw={draw(){
      win(4,4,150,G.party.length*30+12);
      G.party.forEach((id,i)=>{
        const c=G.chars[id];
        drawSpr(c.spr,12,12+i*30);
        text(c.name,32,10+i*30,'#fff'); text('L'+c.lvl,86,10+i*30,'#a0c0ff');
        text('HP '+fmtHP(c),32,20+i*30,c.hp<c.maxhp*0.3?'#ffd040':'#c8d0e0');
        text('BP '+c.bp+'/'+c.maxbp,104,20+i*30,'#c8d0e0');
      });
    }};
    overlays.push(partyDraw); busy++;
    const quidDraw={draw(){ win(4,H-26,100,22); text(G.quid+' quid',14,H-19,'#ffe080'); }};
    overlays.push(quidDraw);
    const sel=await menu({x:160,y:4,w:92,items:[
      {label:'Items'},{label:'Banter'},{label:'Equip'},{label:'Status'},{label:'Save'}]});
    overlays.splice(overlays.indexOf(partyDraw),1);
    overlays.splice(overlays.indexOf(quidDraw),1); busy--;
    if(sel<0)return;
    if(sel===0)await itemMenu();
    else if(sel===1)await skillView();
    else if(sel===2)await equipMenu();
    else if(sel===3)await statusMenu();
    else if(sel===4){ saveGame('save'); SFX.save(); await say(['Game saved. Very responsible. Dorothy would be amazed.']); }
  }
}
function invList(){ return Object.keys(G.inv).filter(k=>G.inv[k]>0); }
async function itemMenu(){
  while(true){
    const keys=invList();
    if(!keys.length){ await say(['Nothing in the cupboard but hope and a bent fork.']); return; }
    const sel=await menu({x:30,y:30,w:196,title:'ITEMS',items:keys.map(k=>({label:ITEMS[k].name,right:'x'+G.inv[k]}))});
    if(sel<0)return;
    const k=keys[sel], it=ITEMS[k];
    await say([it.desc]);
    if(it.heal||it.cure||it.revive||it.bp){
      const who=await menu({x:30,y:30,w:196,title:'USE ON WHO?',items:G.party.map(id=>{
        const c=G.chars[id]; return {label:c.name,right:fmtHP(c)}; })});
      if(who<0)continue;
      const c=G.chars[G.party[who]];
      const r=applyItem(c,k,null);
      await say([r]);
    }
  }
}
function applyItem(c,k,bc){ // bc = battle combatant (for status) or null
  const it=ITEMS[k];
  if(it.revive){
    if(c.hp>0)return c.name+' isn’t even unconscious. Yet.';
    G.inv[k]--; c.hp=Math.floor(c.maxhp/2); SFX.heal();
    return c.name+' staggers back up! "...did I miss last orders?"';
  }
  if(c.hp<=0)return c.name+' has gone to bed. It won’t help.';
  G.inv[k]--;
  let out=[];
  if(it.heal){ const h=Math.min(it.heal,c.maxhp-c.hp); c.hp+=h; out.push('+'+h+' HP'); }
  if(it.bp){ const b=Math.min(it.bp,c.maxbp-c.bp); c.bp+=b; out.push('+'+b+' BP'); }
  if(it.cure&&bc)bc.status={};
  if(it.cure)out.push('right as rain');
  SFX.heal();
  if(it.risk&&Math.random()<it.risk&&bc){ bc.status.poison=true; SFX.bad();
    return c.name+': +HP but... oh no. OH NO. (Poisoned!)'; }
  return c.name+': '+out.join(', ')+'.';
}
async function skillView(){
  const who=await menu({x:30,y:30,w:196,title:'WHOSE BANTER?',items:G.party.map(id=>({label:G.chars[id].name}))});
  if(who<0)return;
  const c=G.chars[G.party[who]];
  if(!c.skills.length){ await say([c.name+' has no banter yet. Tragic, really.']); return; }
  const sel=await menu({x:20,y:30,w:216,title:c.name+'’S BANTER (battle only)',
    items:c.skills.map(s=>({label:SKILLS[s].name,right:SKILLS[s].cost+'BP'}))});
}
async function equipMenu(){
  const who=await menu({x:30,y:30,w:196,title:'EQUIP WHO?',items:G.party.map(id=>({label:G.chars[id].name}))});
  if(who<0)return;
  const c=G.chars[G.party[who]];
  while(true){
    const slot=await menu({x:20,y:30,w:216,title:c.name,items:[
      {label:'Wpn: '+WEAPONS[c.weapon].name,right:'ATK'+wAtk(c)},
      {label:'Arm: '+ARMOR[c.armor].name,right:'DEF'+aDef(c)}]});
    if(slot<0)return;
    if(slot===0){
      const av=G.gear.w.filter(w=>WEAPONS[w].who.includes(c.id));
      if(!av.length){ await say(['No spare weapons for '+c.name+'.']); continue; }
      const s=await menu({x:20,y:30,w:216,title:'WEAPONS',items:av.map(w=>({label:WEAPONS[w].name,right:'ATK'+WEAPONS[w].atk}))});
      if(s<0)continue;
      G.gear.w.splice(G.gear.w.indexOf(av[s]),1); G.gear.w.push(c.weapon);
      c.weapon=av[s]; SFX.confirm();
    } else {
      const av=G.gear.a;
      if(!av.length){ await say(['No spare clobber.']); continue; }
      const s=await menu({x:20,y:30,w:216,title:'CLOBBER',items:av.map(a=>({label:ARMOR[a].name,right:'DEF'+ARMOR[a].def}))});
      if(s<0)continue;
      G.gear.a.splice(G.gear.a.indexOf(av[s]),1); G.gear.a.push(c.armor);
      c.armor=av[s]; SFX.confirm();
    }
  }
}
async function statusMenu(){
  const who=await menu({x:30,y:30,w:196,title:'STATUS',items:G.party.map(id=>({label:G.chars[id].name}))});
  if(who<0)return;
  const c=G.chars[G.party[who]];

}

      const d=ITEMS[s]||WEAPONS[s]||ARMOR[s];

    });

/* ============================== BATTLE ============================== */
function variance(d){ return Math.max(1,Math.floor(d*(0.88+R(0.24)))); }
async function startBattle(form,opts){
  opts=opts||{};
  busy++;
  SFX.swirl();
  // swirl transition
  const snap=document.createElement('canvas'); snap.width=W; snap.height=H;
  snap.getContext('2d').drawImage(cv,0,0);
  for(let i=0;i<26;i++){ await waitFrame();
    ctx.drawImage(snap,0,0);
    ctx.save(); ctx.translate(W/2,H/2); ctx.rotate(i*0.18); ctx.scale(1-i*0.035,1-i*0.035);
    ctx.translate(-W/2,-H/2); ctx.globalAlpha=0.55; ctx.drawImage(snap,0,0); ctx.restore();
    ctx.fillStyle='rgba(0,0,16,'+(i/30)+')'; ctx.fillRect(0,0,W,H);
  }
  const bbg=opts.bbg||MAPS[G.map].bbg||'street';
  B={enemies:[],players:[],popups:[],msg:null,shake:0,over:null,boss:opts.boss,noRun:opts.noRun,
     bbg,targetCursor:null,anim:{}};
  form.forEach((id,i)=>{
    const d=ENEMIES[id];
    const big=d.big?1:0;
    B.enemies.push({id,name:d.name,spr:d.spr,hp:d.hp,maxhp:d.hp,atk:d.atk,def:d.def,mag:d.mag,
      spd:d.spd,exp:d.exp,quid:d.quid,ai:d.ai,boss:d.boss,atb:R(45),status:{},dead:false,fade:1,
      x:big?24:16+ (i%2)*14, y:big?26:26+i*32, sc:d.boss?2:2, ox:0});
  });
  if(B.enemies.length===1&&!B.enemies[0].boss){ B.enemies[0].y=44; }
  G.party.forEach((id,i)=>{
    const c=G.chars[id];
    B.players.push({c,atb:R(55),status:{},defend:false,x:198,y:20+i*30,ox:0,despUsed:false});
  });
  const prevMode=G.mode; G.mode='battle';
  Music.play(opts.boss?'boss':'battle');
  const result=await battleLoop();
  if(result==='lose'){ B=null; await gameOver(); busy--; return 'lose'; }
  G.mode='field';
  Music.play(MAPS[G.map].music);
  B=null; busy--;
  return result;
}
function aliveE(){ return B.enemies.filter(e=>!e.dead); }
function aliveP(){ return B.players.filter(p=>p.c.hp>0); }
async function battleMsg(t,ms){
  B.msg=t; await sleep(ms||850); B.msg=null;
}
function popup(x,y,txt,color){ B.popups.push({x,y,txt,color:color||'#fff',t:0}); }
async function battleLoop(){
  await battleMsg(B.enemies.length>1?'Trouble, in plural!':B.enemies[0].name+' squares up!',900);
  while(true){
    await waitFrame();
    if(!aliveE().length)return await victory();
    if(!aliveP().length)return 'lose';
    // tick ATB
    let ready=null;
    for(const e of aliveE()){ e.atb+=(e.spd+20)*0.09; if(!ready&&e.atb>=100)ready={e}; }
    for(const p of B.players){ if(p.c.hp<=0){p.atb=0;continue;} p.atb+=(p.c.spd+20)*0.09; if(!ready&&p.atb>=100)ready={p}; }
    if(!ready)continue;
    if(ready.e){ await enemyTurn(ready.e); ready.e.atb=0; await statusTick(ready.e,true); }
    else {
      const p=ready.p;
      if(p.status.sleep){ if(Math.random()<0.4){ delete p.status.sleep; popup(p.x,p.y,'woke!','#a0c0ff'); }
        else { await battleMsg(p.c.name+' is out cold...',600); p.atb=0; continue; } }
      p.defend=false;
      const acted=await playerTurn(p);
      if(B.over==='run')return 'run';
      if(acted){ p.atb=0; await statusTick(p,false); }
      else p.atb=95;
    }
    if(!aliveE().length)return await victory();
    if(!aliveP().length)return 'lose';
  }
}
async function statusTick(u,isEnemy){
  const hp=isEnemy?u.hp:u.c.hp, max=isEnemy?u.maxhp:u.c.maxhp;
  if(u.status.poison){
    const d=Math.max(2,Math.floor(max/14)); SFX.bad();
    if(isEnemy){ u.hp=Math.max(0,u.hp-d); popup(u.x+12,u.y,d,'#b0f070'); if(u.hp<=0)await killEnemy(u); }
    else { u.c.hp=Math.max(0,u.c.hp-d); popup(u.x+12,u.y,d,'#b0f070'); }
    await sleep(300);
  }
}
async function killEnemy(e){
  e.dead=true; SFX.hit();
  for(let i=0;i<12;i++){ e.fade=1-i/12; await waitFrame(); await waitFrame(); }
  e.fade=0;
}
function pDef(p){ let d=Math.floor(p.c.vit*1.5)+aDef(p.c);
  if(p.status.defup)d=Math.floor(d*1.4); return d; }
async function hitPlayer(p,raw,name){
  let d=variance(raw);
  if(p.defend)d=Math.floor(d/2);
  if(p.status.defup)d=Math.floor(d*0.75);
  d=Math.max(1,d);
  p.c.hp=Math.max(0,p.c.hp-d);
  SFX.hit(); B.shake=8; popup(p.x+10,p.y+4,d,'#fff');
  if(p.status.sleep&&Math.random()<0.7)delete p.status.sleep;
  if(p.c.hp<=0){ popup(p.x+10,p.y-6,'gone to bed','#f08080'); }
}
async function enemyTurn(e){
  if(e.status.sleep){ if(Math.random()<0.4){ delete e.status.sleep; popup(e.x+12,e.y,'woke!','#a0c0ff'); }
    else { await battleMsg(e.name+' snoozes...',600); return; } }
  const act=e.ai(e,B);
  if(act.kind==='talk'){ await battleMsg(act.name,1400); return; }
  if(act.kind==='charge'){ await battleMsg(act.name+'  (DEFEND!)',1200); return; }
  const atkMult=e.status.atkdn?0.6:1;
  const nm=act.name?e.name+': '+act.name:e.name+' attacks!';
  B.msg=nm;
  e.ox=10; await sleep(240); e.ox=0;
  const targets=act.all?aliveP():[aliveP()[RI(aliveP().length)]];
  for(const p of targets){
    const raw=(e.atk*2.1*act.pow*atkMult)-pDef(p);
    await hitPlayer(p,Math.max(3,raw),act.name);
    if(act.steal&&G.quid>0){ const s=Math.min(G.quid,8+RI(18)); G.quid-=s;
      popup(p.x+10,p.y-8,'-'+s+'q!','#ffe080'); }
    if(act.status&&Math.random()<(act.statusCh||0.5)&&p.c.hp>0){
      p.status[act.status]=true; popup(p.x+10,p.y-8,act.status==='atkdn'?'weakened':act.status,'#e0a0f0'); }
    await sleep(260);
  }
  await sleep(350); B.msg=null;
}
async function playerTurn(p){
  const c=p.c;
  B.activeP=p;
  const opts=[{label:'Fight'},{label:'Banter',dis:!c.skills.length||p.status.silence},
    {label:'Item',dis:!invList().length},{label:'Defend'},{label:'Leg It',dis:!!B.noRun}];
  const sel=await menu({x:4,y:122,w:88,items:opts,cancel:false,title:c.name});
  if(sel===0){ // fight
    const t=await pickEnemy(); if(!t)return false;
    // desperation attack
    if(c.hp<c.maxhp*0.25&&!p.despUsed&&Math.random()<0.35){
      p.despUsed=true;
      await battleMsg('★ '+c.desp.name+' ★',1100);
      SFX.crit(); B.shake=12;
      p.ox=-14; await sleep(200); p.ox=0;
      for(const e of aliveE()){
        const d=variance((c.str+wAtk(c))*2*c.desp.pow+c.lvl*2-e.def);
        e.hp=Math.max(0,e.hp-d); popup(e.x+14,e.y+6,d,'#ffe080');
        if(e.hp<=0)await killEnemy(e);
      }
      await sleep(400); B.activeP=null; return true;
    }
    p.ox=-12; await sleep(180); p.ox=0;
    const atkMult=p.status.atkdn?0.6:1;
    let d=(c.str+wAtk(c))*2*atkMult+c.lvl*2-t.def*1.5;
    let crit=Math.random()<1/16;
    d=variance(Math.max(2,d)); if(crit){ d*=2; SFX.crit(); B.shake=10; await battleMsg('CRITICAL!',420); }
    else SFX.hit();
    t.hp=Math.max(0,t.hp-d); popup(t.x+14,t.y+6,d,crit?'#ffe080':'#fff');
    if(t.status.sleep&&Math.random()<0.8){ delete t.status.sleep; }
    if(t.hp<=0)await killEnemy(t);
    await sleep(380); B.activeP=null; return true;
  }
  if(sel===1){ // banter
    const sk=await menu({x:94,y:122,w:158,title:'BANTER  ('+c.bp+' BP)',
      items:c.skills.map(s=>({label:SKILLS[s].name,right:SKILLS[s].cost+'',dis:c.bp<SKILLS[s].cost}))});
    if(sk<0)return false;
    const s=SKILLS[c.skills[sk]];
    let targetE=null, targetA=null;
    if(s.tgt==='enemy'){ targetE=await pickEnemy(); if(!targetE)return false; }
    if(s.tgt==='ally'){ targetA=await pickAlly(s.revive); if(!targetA)return false; }
    c.bp-=s.cost;
    await battleMsg(c.name+' '+s.msg,900);
    if(s.tgt==='special'){ // harebrained scheme
      const roll=Math.random();
      if(roll<0.35){ SFX.crit(); B.shake=12; await battleMsg('IT ACTUALLY WORKS!',700);
        for(const e of aliveE()){ const d=variance(c.mag*5+c.lvl*3);
          e.hp=Math.max(0,e.hp-d); popup(e.x+14,e.y+6,d,'#ffe080'); if(e.hp<=0)await killEnemy(e); } }
      else if(roll<0.6){ const t=aliveE()[RI(aliveE().length)]; SFX.magic();
        const d=variance(c.mag*7+c.lvl*4); t.hp=Math.max(0,t.hp-d);
        popup(t.x+14,t.y+6,d,'#ffe080'); if(t.hp<=0)await killEnemy(t); }
      else if(roll<0.85){ SFX.bad(); await battleMsg('It backfires. Of course it backfires.',800);
        const d=Math.max(2,Math.floor(c.maxhp*0.12)); c.hp=Math.max(1,c.hp-d); popup(p.x+10,p.y,d,'#f08080'); }
      else { await battleMsg('...nothing happens. Tony nods, satisfied.',900); }
      B.activeP=null; return true;
    }
    if(s.heal!=null){
      SFX.heal();
      const tgts=s.tgt==='allies'?aliveP():[targetA];
      for(const t of tgts){ const h=Math.min(s.heal+c.mag*2,t.c.maxhp-t.c.hp);
        t.c.hp+=h; popup(t.x+10,t.y+4,'+'+h,'#80f090'); }
      await sleep(400); B.activeP=null; return true;
    }
    if(s.revive){
      SFX.heal(); targetA.c.hp=Math.floor(targetA.c.maxhp/2);
      popup(targetA.x+10,targetA.y,'REVIVED','#80f090');
      await sleep(400); B.activeP=null; return true;
    }
    if(s.status==='defup'){
      SFX.heal(); aliveP().forEach(t=>{ t.status.defup=true; popup(t.x+10,t.y,'DEF up','#a0c0ff'); });
      await sleep(400); B.activeP=null; return true;
    }
    SFX.magic();
    const tgts=s.tgt==='enemies'?aliveE():[targetE];
    const mult=tgts.length>1?0.7:1;
    for(const t of tgts){
      const d=variance((s.pow*(c.mag*2.2+c.lvl*2)-t.def*0.8)*mult);
      t.hp=Math.max(0,t.hp-Math.max(2,d)); popup(t.x+14,t.y+6,Math.max(2,d),'#c0d0ff');
      if(s.status&&t.hp>0&&Math.random()<(s.statusCh||0.5)&&!t.boss){
        t.status[s.status]=true; popup(t.x+14,t.y-6,s.status,'#e0a0f0'); }
      if(t.hp<=0)await killEnemy(t);
      await sleep(200);
    }
    await sleep(300); B.activeP=null; return true;
  }
  if(sel===2){ // item
    const keys=invList();
    const it=await menu({x:94,y:122,w:158,title:'ITEMS',
      items:keys.map(k=>({label:ITEMS[k].name,right:'x'+G.inv[k]}))});
    if(it<0)return false;
    const k=keys[it];
    const t=await pickAlly(!!ITEMS[k].revive); if(!t)return false;
    const r=applyItem(t.c,k,t);
    await battleMsg(r,1100);
    B.activeP=null; return true;
  }
  if(sel===3){ p.defend=true; popup(p.x+10,p.y,'defending','#a0c0ff'); B.activeP=null; return true; }
  if(sel===4){
    if(Math.random()<0.7){ await battleMsg('The lads leg it! Dignity: optional.',900); B.over='run'; B.activeP=null;
      return true; }
    await battleMsg('Cornered! No escape from this one.',800); B.activeP=null; return true;
  }
  B.activeP=null; return false;
}
async function pickEnemy(){
  const es=aliveE();
  if(es.length===1)return es[0];
  busy++; let sel=0, res=null;
  const o={draw(){ const e=es[sel]; cursorHand(e.x-8,e.y+8);
    win(W/2-70,4,140,20); textC(e.name,W/2,10,'#fff'); }};
  overlays.push(o); flushInput();
  while(true){
    await waitFrame();
    const b=readBtn(), t=readTap();
    if(t){ let best=0,bd=1e9; es.forEach((e,i)=>{ const d=Math.abs(e.x+16-t.x)+Math.abs(e.y+16-t.y);
        if(d<bd){bd=d;best=i;} });
      if(best===sel){ SFX.confirm(); res=es[sel]; break; } sel=best; SFX.cursor(); continue; }
    if(b==='UP'||b==='LEFT'){ sel=(sel+es.length-1)%es.length; SFX.cursor(); }
    else if(b==='DOWN'||b==='RIGHT'){ sel=(sel+1)%es.length; SFX.cursor(); }
    else if(b==='A'){ SFX.confirm(); res=es[sel]; break; }
    else if(b==='B'){ SFX.cancel(); break; }
  }
  overlays.splice(overlays.indexOf(o),1); busy--;
  return res;
}
async function pickAlly(deadOnly){
  const ps=B.players.filter(p=>deadOnly?p.c.hp<=0:true);
  if(!ps.length){ await battleMsg(deadOnly?'Nobody’s gone to bed. Yet.':'--',700); return null; }
  busy++; let sel=0,res=null;
  const o={draw(){ const p=ps[sel]; cursorHand(p.x-10,p.y+8); }};
  overlays.push(o); flushInput();
  while(true){
    await waitFrame();
    const b=readBtn(), t=readTap();
    if(t){ let best=0,bd=1e9; ps.forEach((p,i)=>{ const d=Math.abs(p.x+12-t.x)+Math.abs(p.y+16-t.y);
        if(d<bd){bd=d;best=i;} });
      if(best===sel){ SFX.confirm(); res=ps[sel]; break; } sel=best; SFX.cursor(); continue; }
    if(b==='UP'){ sel=(sel+ps.length-1)%ps.length; SFX.cursor(); }
    else if(b==='DOWN'){ sel=(sel+1)%ps.length; SFX.cursor(); }
    else if(b==='A'){ SFX.confirm(); res=ps[sel]; break; }
    else if(b==='B'){ SFX.cancel(); break; }
  }
  overlays.splice(overlays.indexOf(o),1); busy--;
  return res;
}
async function victory(){
  G.wins++;
  Music.stop(); Music.play('fanfare');
  B.players.forEach(p=>{ p.status={}; });
  const exp=B.enemies.reduce((s,e)=>s+e.exp,0), quid=B.enemies.reduce((s,e)=>s+e.quid,0);
  await battleMsg('VICTORY! The lads strike unearned poses.',2800);
  Music.play('victory');
  G.quid+=quid;
  await say(['Got '+exp+' exp and '+quid+' quid!']);
  for(const p of B.players){
    if(p.c.hp<=0)continue;
    const c=p.c; c.exp+=exp;
    while(c.exp>=expNext(c.lvl)){
      c.exp-=expNext(c.lvl); c.lvl++;
      const oh=c.maxhp,ob=c.maxbp; recalcChar(c);
      c.hp=Math.min(c.maxhp,c.hp+(c.maxhp-oh)); c.bp=Math.min(c.maxbp,c.bp+(c.maxbp-ob));
      SFX.save();
      await say([c.name+' grew to level '+c.lvl+'!  HP+'+(c.maxhp-oh)+' BP+'+(c.maxbp-ob)]);
      const learn=CHARDEF[c.id].learn[c.lvl];
      if(learn&&!c.skills.includes(learn)){ c.skills.push(learn);
        SFX.heal(); await say([c.name+' learned '+SKILLS[learn].name+'!']); }
    }
  }
  return 'win';
}
function drawBattle(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  const sh=B.shake>0?RI(B.shake)-B.shake/2:0;
  if(B.shake>0)B.shake--;
  ctx.save(); ctx.translate(sh,0);
  BATTLEBG[B.bbg]();
  for(const e of B.enemies){
    if(e.dead&&e.fade<=0)continue;
    ctx.globalAlpha=e.fade;
    drawSpr(e.spr,e.x+e.ox,e.y,e.sc);
    ctx.globalAlpha=1;
    if(e.status.sleep)text('z',e.x+SPR[e.spr].width*e.sc-4,e.y-6,'#a0c0ff');
    if(e.status.poison)text('psn',e.x-2,e.y-6,'#b0f070');
  }
  for(const p of B.players){
    const c=p.c;
    if(c.hp<=0){ ctx.save(); ctx.translate(p.x+p.ox+4,p.y+30); ctx.rotate(-Math.PI/2);
      ctx.globalAlpha=0.8; drawSpr(c.spr,0,0,2); ctx.restore(); ctx.globalAlpha=1; continue; }
    const crouch=c.hp<c.maxhp*0.25?2:0;
    drawSpr(c.spr,p.x+p.ox,p.y+crouch,2,true);
    if(p.status.sleep)text('z',p.x-6,p.y-4,'#a0c0ff');
    if(p.status.poison)text('psn',p.x+22,p.y-4,'#b0f070');
    if(B.activeP===p)cursorHand(p.x-12,p.y+10);
  }
  ctx.restore();
  // popups
  B.popups=B.popups.filter(pp=>pp.t<40);
  for(const pp of B.popups){
    pp.t++;
    const dy=pp.t<10?-pp.t:-10+ (pp.t-10)*0.15;
    text(''+pp.txt,pp.x,pp.y+dy,pp.color);
  }
  // bottom UI
  win(0,152,100,72);
  let yy=160;
  for(const e of aliveE().slice(0,4)){ text(e.name.length>11?e.name.slice(0,11)+'…':e.name,6,yy,'#fff'); yy+=13; }
  win(100,152,156,72);
  B.players.forEach((p,i)=>{
    const c=p.c, y=160+i*15;
    text(c.name.slice(0,7),106,y,c.hp<=0?'#888':'#fff');
    textR(''+c.hp,196,y,c.hp<=0?'#f08080':c.hp<c.maxhp*0.25?'#ffd040':'#fff');
    text(''+c.bp,202,y,'#a0c0ff');
    bar(224,y+2,28,4,p.atb/100,'#48a0e8');
  });
  if(B.msg){ win(10,4,W-20,22); textC(B.msg,W/2,11,'#fff'); }
}
async function gameOver(){
  Music.stop(); Music.play('gameover');
  fadeDir=1; while(fade<1)await waitFrame();
  G.mode='gameover'; fadeDir=-1; while(fade>0)await waitFrame();
  flushInput();
  while(true){ await waitFrame(); const b=readBtn(),t=readTap();
    if(b==='A'||t)break; }
  if(hasSave()){ loadGame(); Music.play(MAPS[G.map].music); }
  else { newGame(); G.mode='title'; Music.play('title'); }
}
function drawGameOver(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  textC('GAME OVER',W/2,80,'#e04040',14);
  textC('The lads have gone to bed.',W/2,105,'#aaa');
  textC('(tap to carry on from your last save)',W/2,130,'#667');
}

/* ============================== TITLE ============================== */
let titleSel=0;
function drawTitle(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#181048'); g.addColorStop(0.6,'#483068'); g.addColorStop(1,'#a05838');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#f8e8a0';
  for(let i=0;i<28;i++){ const x=(i*97)%W, y=(i*53)%110; ctx.fillRect(x,y,1,1); }
  drawSpr('sofa',66,120,4);
  drawSpr('gary',98,96,2); drawSpr('tony',138,96,2);
  textC('MEN BEHAVING BADLY',W/2,28,'#ffe080',15);
  textC('~ LAGER FANTASY ~',W/2,50,'#a0c0ff',10);
  win(78,168,100,44);
  text('New Game',100,176,'#fff');
  text('Continue',100,190,hasSave()?'#fff':'#667');
  cursorHand(86,176+titleSel*14);
  textC('D-pad: move   A: talk/confirm   B: menu/cancel',W/2,216,'#c8c0a8');
}
async function titleLoop(){
  Music.play('title');
  flushInput();
  while(true){
    await waitFrame();
    const b=readBtn(), t=readTap();
    if(t){ const idx=Math.floor((t.y-176)/14);
      if(t.y>=170&&idx>=0&&idx<=1){ if(idx===titleSel){ if(idx===0||hasSave()){SFX.confirm(); break;} SFX.buzz(); }
        else {titleSel=idx; SFX.cursor();} }
      continue; }
    if(b==='UP'||b==='DOWN'){ titleSel=1-titleSel; SFX.cursor(); }
    else if(b==='A'){ if(titleSel===0||hasSave()){ SFX.confirm(); break; } SFX.buzz(); }
  }
  if(titleSel===1&&hasSave()&&loadGame()){
    Music.play(MAPS[G.map].music);
    return;
  }
  newGame(); G.mode='intro';
  await say(['LONDON. THE 1990s.','An age of heroes. Of legends. Of men who could sit on a sofa for nine consecutive hours and call it "a plan coming together".',
    'In a ground-floor flat in South London, destiny is about to knock.','Well. Not knock. Slam a door and stab a note to the table with a fork.',
    'MEN BEHAVING BADLY: LAGER FANTASY']);
  G.mode='field'; G.mapMsgT=110;
  Music.play('field');
  await say(['GARY: Ugh. Morning. Why is it so QUIET in here?','GARY: ...Dorothy? Dorothy??',
    '(Check the NOTE on the table, then talk to TONY. A = interact.)']);
}
function drawIntro(){ ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); }

/* ============================== MAIN LOOP ============================== */
let lastT=0;
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(0.05,(ts-lastT)/1000||0.016); lastT=ts;
  // update
  if(G){
    if(G.mode==='field')updateField(dt);
  }
  fade=clamp(fade+fadeDir*dt*3.2,0,1);
  // draw
  if(!G||G.mode==='title')drawTitle();
  else if(G.mode==='intro')drawIntro();
  else if(G.mode==='field')drawField();
  else if(G.mode==='battle'&&B)drawBattle();
  else if(G.mode==='gameover')drawGameOver();
  else if(G.mode==='ending')drawEnding();
  drawOverlays();
  if(fade>0){ ctx.fillStyle='rgba(0,0,0,'+fade+')'; ctx.fillRect(0,0,W,H); }
  // resolve frame waiters
  const rs=frameResolvers; frameResolvers=[]; rs.forEach(r=>r());
}
async function boot(){
  newGame();
  requestAnimationFrame(frame);
  while(true){
    G.mode='title';
    await titleLoop();
    // play until game returns to title (gameOver with no save)
    while(G.mode!=='title'){ await sleep(500); }
  }
}
boot();
</script>
